<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Harmony Living — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#F4F8FC;--blush:#B8D4E8;--rose:#4A7FB5;--deep:#1E3A5F}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--deep);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;position:relative}

.blob{position:absolute;border-radius:50%;filter:blur(70px);pointer-events:none}
.blob-1{width:500px;height:500px;background:rgba(74,127,181,0.12);top:-150px;right:-80px;animation:float1 9s ease-in-out infinite}
.blob-2{width:350px;height:350px;background:rgba(184,212,232,0.15);bottom:-100px;left:-60px;animation:float2 11s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.04)}}
@keyframes float2{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(22px) scale(0.97)}}

.center{position:relative;z-index:1;text-align:center;padding:2rem}

.logo{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;letter-spacing:0.08em;color:var(--deep);text-decoration:none;display:inline-block;margin-bottom:3.5rem}
.logo em{font-style:italic;color:var(--rose)}

.eyebrow{font-size:0.68rem;letter-spacing:0.24em;text-transform:uppercase;font-weight:500;color:var(--rose);margin-bottom:1.4rem;background:linear-gradient(90deg,var(--rose),var(--blush),var(--rose));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:grad 4s linear infinite}
@keyframes grad{0%{background-position:0% center}100%{background-position:200% center}}

h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,6vw,5rem);font-weight:300;line-height:1.08;margin-bottom:1.4rem}
h1 em{font-style:italic;color:var(--rose)}

.sub{font-size:0.92rem;line-height:1.9;opacity:0.55;max-width:420px;margin:0 auto 3rem}

.divider{width:40px;height:1px;background:rgba(74,127,181,0.3);margin:0 auto 3rem}

/* Dev entrance */
.dev-area{position:fixed;bottom:1.6rem;left:50%;transform:translateX(-50%);text-align:center}
.dev-trigger{font-size:0.62rem;letter-spacing:0.14em;text-transform:uppercase;opacity:0.3;cursor:pointer;background:none;border:none;font-family:'Jost',sans-serif;color:var(--deep);transition:opacity 0.2s;padding:0.3rem 0.6rem}
.dev-trigger:hover{opacity:0.6}

.dev-modal{display:none;position:fixed;inset:0;z-index:999;align-items:center;justify-content:center;background:rgba(30,58,95,0.18);backdrop-filter:blur(6px)}
.dev-modal.open{display:flex}
.dev-box{background:var(--cream);border:0.5px solid rgba(30,58,95,0.12);border-radius:20px;padding:2.4rem 2.8rem;width:min(360px,90vw);box-shadow:0 24px 60px rgba(30,58,95,0.14);text-align:center}
.dev-box h3{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;margin-bottom:0.4rem}
.dev-box p{font-size:0.78rem;opacity:0.45;margin-bottom:1.6rem;letter-spacing:0.04em}
.dev-input{width:100%;background:white;border:1px solid rgba(30,58,95,0.14);color:var(--deep);font-family:'Jost',sans-serif;font-size:0.88rem;padding:0.85rem 1.1rem;border-radius:12px;outline:none;transition:border-color 0.25s,box-shadow 0.25s;text-align:center;letter-spacing:0.06em}
.dev-input:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(74,127,181,0.1)}
.dev-input::placeholder{opacity:0.35;letter-spacing:0}
.dev-error{font-size:0.73rem;color:#c0392b;margin-top:0.5rem;min-height:1.1em;opacity:0;transition:opacity 0.2s}
.dev-error.show{opacity:1}
.dev-btn{width:100%;background:var(--deep);color:var(--cream);border:none;font-family:'Jost',sans-serif;font-size:0.78rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;padding:0.95rem;border-radius:2rem;cursor:pointer;transition:background 0.25s,transform 0.2s;margin-top:1rem}
.dev-btn:hover{background:var(--rose);transform:translateY(-2px)}
.dev-close{margin-top:0.85rem;font-size:0.7rem;opacity:0.35;cursor:pointer;background:none;border:none;font-family:'Jost',sans-serif;color:var(--deep);transition:opacity 0.2s;letter-spacing:0.08em}
.dev-close:hover{opacity:0.6}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="center">
  <a href="#" class="logo">Har<em>mony</em></a>
  <p class="eyebrow">Something beautiful is coming</p>
  <h1>We're putting the<br>finishing <em>touches</em> on</h1>
  <div class="divider"></div>
  <p class="sub">Harmony Living is almost ready. We're crafting a space rooted in holistic wellness, clean beauty, and the science of feeling your best.</p>
</div>

<div class="dev-area">
  <button class="dev-trigger" onclick="openDev()">Developer entrance</button>
</div>

<div class="dev-modal" id="devModal">
  <div class="dev-box">
    <h3>Developer <em style="font-style:italic;color:var(--rose)">access</em></h3>
    <p>Enter the password to continue</p>
    <input class="dev-input" type="password" id="devPass" placeholder="Password" onkeydown="if(event.key==='Enter')checkPass()" />
    <div class="dev-error" id="devError">Incorrect password. Try again.</div>
    <button class="dev-btn" onclick="checkPass()">Enter</button>
    <button class="dev-close" onclick="closeDev()">Cancel</button>
  </div>
</div>

<script>
function openDev(){
  document.getElementById('devModal').classList.add('open');
  setTimeout(()=>document.getElementById('devPass').focus(),80);
}
function closeDev(){
  document.getElementById('devModal').classList.remove('open');
  document.getElementById('devPass').value='';
  document.getElementById('devError').classList.remove('show');
}
function checkPass(){
  const val=document.getElementById('devPass').value;
  if(val==='LatviaIsCool'){
    window.location.href='home.html';
  } else {
    const err=document.getElementById('devError');
    err.classList.add('show');
    document.getElementById('devPass').value='';
    document.getElementById('devPass').focus();
    setTimeout(()=>err.classList.remove('show'),2800);
  }
}
document.getElementById('devModal').addEventListener('click',function(e){
  if(e.target===this)closeDev();
});
</script>
</body>
</html>
